name: Build Android Members

on:
  push:
    tags:
      - 'members-v*'
  pull_request:
    paths:
      - 'members-android/**'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: false
        default: false
        type: boolean
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install required SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0" "platforms;android-35"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.12'

      - name: Inject version from tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/members-v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#members-v}"
          else
            VERSION="${{ inputs.version || '0.0.0' }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          GRADLE_FILE="members-android/app/build.gradle.kts"
          sed -i "s/versionName = .*/versionName = \"$VERSION\"/" "$GRADLE_FILE"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VCODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
          [ "$VCODE" -lt 1 ] && VCODE=1
          sed -i "s/versionCode = .*/versionCode = $VCODE/" "$GRADLE_FILE"
          echo "Set version: $VERSION (code: $VCODE)"
          grep -E "version(Code|Name)" "$GRADLE_FILE"

      - name: Build Debug APK
        working-directory: members-android
        run: gradle assembleDebug --stacktrace

      - name: Setup signing keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.MEMBERS_KEYSTORE_PASSWORD }}
          KEYSTORE_BASE64: ${{ secrets.MEMBERS_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"
            echo "MEMBERS_KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "MEMBERS_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
            echo "MEMBERS_KEY_ALIAS=members" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        working-directory: members-android
        run: gradle assembleRelease --stacktrace

      - name: Build Release App Bundle (AAB) for Play Store
        working-directory: members-android
        run: gradle bundleRelease --stacktrace

      - name: Setup Play Console Service-Account
        if: startsWith(github.ref, 'refs/tags/members-v')
        env:
          PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$PLAY_JSON" ]; then
            echo "$PLAY_JSON" > "$GITHUB_WORKSPACE/play-service-account.json"
            echo "PLAY_SERVICE_ACCOUNT_JSON_PATH=$GITHUB_WORKSPACE/play-service-account.json" >> $GITHUB_ENV
          fi

      - name: Upload App Bundle to Play Store (Internal Testing)
        if: startsWith(github.ref, 'refs/tags/members-v') && env.PLAY_SERVICE_ACCOUNT_JSON_PATH != ''
        working-directory: members-android
        run: gradle publishReleaseBundle --stacktrace

      - name: Rename APKs
        run: |
          DEBUG_APK=$(find members-android -name "*debug*.apk" -type f | head -1)
          RELEASE_APK=$(find members-android -name "*release*.apk" -type f | head -1)
          if [ -n "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "members-${VERSION}-debug.apk"
          fi
          if [ -n "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "members-${VERSION}-release.apk"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: members-debug
          path: members-*-debug.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: members-release
          path: members-*-release.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/members-v') || inputs.create_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('members-v{0}', inputs.version) }}
          name: FWV Raura Members ${{ github.ref_name || format('members-v{0}', inputs.version) }}
          generate_release_notes: true
          files: |
            members-*-debug.apk
            members-*-release.apk
          body: |
            ## FWV Raura Mitglieder-App

            Native Android-App für Mitglieder und Veranstaltungs-Organisatoren des
            Feuerwehrvereins Raura.

            **Kompatibilität:** Android 8.0+ (API 26)

            ### Installation

            1. APK auf das Android-Gerät übertragen
            2. "Unbekannte Quellen" in den Einstellungen erlauben
            3. APK installieren
            4. Anmelden mit Mitgliederkonto, als Organisator oder per QR-Code

            ### Phase 1a (dieses Release)

            - Login-Screen mit drei Modi (Mitglied / Organisator / QR-Code)
            - Organisator-Login funktional
            - QR-Login (nach Backend-Endpoint)
            - Mitglieder-OIDC-Login folgt in nächster Version

            ### Hinweis zum Vertrieb

            Diese Version wird zunächst direkt über GitHub Releases verteilt.
            Eine Veröffentlichung über Google Play Closed Testing folgt sobald
            der Play-Console-Account verifiziert ist.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
