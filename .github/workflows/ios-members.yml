name: Build iOS Members

on:
  push:
    branches: [main]
    paths:
      - 'members-ios/**'
      - '.github/workflows/ios-members.yml'
  pull_request:
    paths:
      - 'members-ios/**'
      - '.github/workflows/ios-members.yml'

jobs:
  build:
    name: Compile-Check (Simulator, unsigniert)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain-Info
        run: |
          xcodebuild -version
          xcodegen --version || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: members-ios
        run: |
          xcodegen generate
          ls -la FWVMembers.xcodeproj

      - name: Build for iOS Simulator
        working-directory: members-ios
        run: |
          set -o pipefail
          xcodebuild \
            -project FWVMembers.xcodeproj \
            -scheme FWVMembers \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
