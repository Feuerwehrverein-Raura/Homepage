server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Service Worker nicht cachen (Auto-Update der PWA)
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA: alle Routen (inkl. /auth/callback, ?share=…) auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API/WebSocket laufen direkt gegen inventar.fwv-raura.ch (nicht hier).
}
